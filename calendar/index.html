<!-- Lang / City Modal -->
<div id="settings-modal" class="hidden fixed inset-0 z-[200] flex items-end sm:items-center justify-center bg-black/40 backdrop-blur-sm px-4 pb-4">
  <div class="bg-surface-container-lowest rounded-2xl p-6 w-full max-w-sm shadow-xl">
    <h3 class="font-headline font-bold text-lg mb-5">Settings</h3>
    <div class="space-y-4">
      <div>
        <label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2 block">Language</label>
        <select id="modal-lang" class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-primary/30">
          <option value="ta">தமிழ் (Tamil)</option>
          <option value="te">తెలుగు (Telugu)</option>
          <option value="kn">ಕನ್ನಡ (Kannada)</option>
          <option value="ml">മലയാളം (Malayalam)</option>
          <option value="en" selected>English</option>
        </select>
      </div>
      <div>
        <label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2 block">City</label>
        <select id="modal-city" class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-primary/30"></select>
      </div>
    </div>
    <div class="flex gap-3 mt-6">
      <button id="modal-cancel" class="flex-1 py-3 rounded-xl border border-outline-variant text-sm font-semibold text-on-surface-variant hover:bg-surface-container-low transition-colors">Cancel</button>
      <button id="modal-save" class="flex-1 py-3 rounded-xl bg-primary text-on-primary text-sm font-semibold hover:bg-primary/90 transition-colors">Save</button>
    </div>
  </div>

<script type="module">
import {
  CITY_PRESETS, TITHI_NAMES, NAKSHATRA, RASI, I18N,
  currentCity, currentCityIdx, currentLang,
  setCity, setLang,
  fmtTime, toLocalDateStr,
  getRahuKalam, getYamagandam, getAbhijit, getAmrita, getBrahma,
  tithiName, nakshatraName, rasiName, paksha, pakshaNative,
  solarDayLabel, moonPhaseEmoji, getFestivalTags,
  fetchMonthData,
} from '/js/shared.js';

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
const today = new Date();
let viewYear  = today.getFullYear();
let viewMonth = today.getMonth(); // 0-based
let monthData = null; // map from "YYYY-MM-DD" → apiDay
let selectedDate = null;

const GREG_MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const SOLAR_MONTH_NAMES = ['Chittirai','Vaikasi','Aani','Aadi','Aavani','Purattasi','Aippasi','Karthigai','Margazhi','Thai','Maasi','Panguni'];

// ---------------------------------------------------------------------------
// Utilities
// ---------------------------------------------------------------------------
function pad(n) { return String(n).padStart(2, '0'); }
function dateKey(y, m, d) { return `${y}-${pad(m+1)}-${pad(d)}`; }
function fmtRange(a, b) { return `${fmtTime(a)} – ${fmtTime(b)}`; }

function approxSolarMonth(date) {
  const idx = ((date.getMonth() - 3 + 12) % 12);
  return SOLAR_MONTH_NAMES[idx];
}

// ---------------------------------------------------------------------------
// City / Lang UI
// ---------------------------------------------------------------------------
function populateCitySelect() {
  const sel = document.getElementById('modal-city');
  sel.innerHTML = '';
  CITY_PRESETS.forEach((c, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${c.name}, ${c.region}`;
    if (i === currentCityIdx) opt.selected = true;
    sel.appendChild(opt);
  });
}

function updateCityUI() {
  document.getElementById('city-btn-text').textContent = currentCity.name;
}

function updateLangUI() {
  const labels = { ta:'TA', te:'TE', kn:'KN', ml:'ML', en:'EN' };
  document.getElementById('lang-btn').textContent = labels[currentLang] || 'EN';
  document.getElementById('modal-lang').value = currentLang;
}

// ---------------------------------------------------------------------------
// Modal
// ---------------------------------------------------------------------------
const modal = document.getElementById('settings-modal');
document.getElementById('lang-btn').addEventListener('click', () => { populateCitySelect(); updateLangUI(); modal.classList.remove('hidden'); });
document.getElementById('city-btn').addEventListener('click', () => { populateCitySelect(); updateLangUI(); modal.classList.remove('hidden'); });
document.getElementById('modal-cancel').addEventListener('click', () => modal.classList.add('hidden'));
modal.addEventListener('click', e => { if (e.target === modal) modal.classList.add('hidden'); });
document.getElementById('modal-save').addEventListener('click', () => {
  const langVal = document.getElementById('modal-lang').value;
  const cityVal = parseInt(document.getElementById('modal-city').value, 10);
  setLang(langVal);
  setCity(cityVal);
  updateCityUI();
  updateLangUI();
  modal.classList.add('hidden');
  // reload month with new city
  monthData = null;
  loadMonth(viewYear, viewMonth);
});

// ---------------------------------------------------------------------------
// Calendar rendering
// ---------------------------------------------------------------------------
function renderSkeleton() {
  const grid = document.getElementById('calendar-grid');
  grid.innerHTML = '<div class="col-span-7 py-16 text-center text-on-surface-variant text-sm animate-pulse">Loading…</div>';
}

function renderGrid() {
  const grid = document.getElementById('calendar-grid');
  grid.innerHTML = '';

  const first = new Date(viewYear, viewMonth, 1);
  const last  = new Date(viewYear, viewMonth + 1, 0);

  // Grid starts on the Sunday before or on the 1st
  const gridStart = new Date(first);
  gridStart.setDate(gridStart.getDate() - gridStart.getDay());
  const gridEnd = new Date(last);
  gridEnd.setDate(gridEnd.getDate() + (6 - gridEnd.getDay()));

  const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

  let cur = new Date(gridStart);
  while (cur <= gridEnd) {
    const y = cur.getFullYear();
    const m = cur.getMonth();
    const d = cur.getDate();
    const key = dateKey(y, m, d);
    const isCurrentMonth = (m === viewMonth && y === viewYear);
    const isToday = key === todayKey;
    const isSelected = selectedDate === key;
    const isSunday = cur.getDay() === 0;
    const isSaturday = cur.getDay() === 6;
    const apiDay = monthData ? monthData[key] : null;

    const cell = document.createElement('div');
    cell.className = 'day-cell aspect-square p-1.5 border-r border-b border-surface-container relative';
    if (!isCurrentMonth) cell.classList.add('opacity-40');
    if (isToday) cell.classList.add('today');
    if (isSelected) cell.classList.add('selected');
    cell.dataset.key = key;

    // Date number
    const numClass = isSelected ? 'text-sm font-extrabold text-primary' :
                     isToday    ? 'text-sm font-bold text-primary' :
                     isSunday   ? 'text-sm font-bold text-error' :
                     isSaturday ? 'text-sm font-bold text-secondary' :
                                  'text-sm font-bold text-on-surface';

    let inner = `<div class="flex justify-between items-start mb-0.5">
      <span class="${numClass}">${d}</span>`;

    if (apiDay) {
      const sr = new Date(apiDay.sunriseMs);
      inner += `<span class="text-[8px] text-on-surface-variant leading-tight text-right hidden sm:block">
        🌅${fmtTime(sr, currentCity.timeZone)}
      </span>`;
    }
    inner += `</div>`;

    if (apiDay) {
      const tithi = tithiName(apiDay.tithi, currentLang);
      const naks  = nakshatraName(apiDay.nakshatra, currentLang);
      inner += `<div class="text-[9px] text-primary font-bold leading-tight truncate">${tithi}</div>`;
      inner += `<div class="text-[8px] text-on-surface-variant truncate">${naks}</div>`;

      const festivals = getFestivalTags(new Date(key), apiDay.tithi, currentLang);
      if (festivals.length) {
        inner += `<div class="absolute bottom-1 right-1 w-1.5 h-1.5 rounded-full bg-secondary shadow-sm"></div>`;
      }
    } else if (isCurrentMonth) {
      inner += `<div class="text-[8px] text-on-surface-variant/40 mt-1">—</div>`;
    }

    cell.innerHTML = inner;
    cell.addEventListener('click', () => selectDay(key));
    grid.appendChild(cell);
    cur.setDate(cur.getDate() + 1);
  }
}

// ---------------------------------------------------------------------------
// Load month data
// ---------------------------------------------------------------------------
async function loadMonth(year, month) {
  // Update month heading immediately
  const heading = `${GREG_MONTHS[month]} ${year}`;
  document.getElementById('month-heading').textContent = heading;
  document.getElementById('header-month-text').textContent = heading;

  const solar = approxSolarMonth(new Date(year, month, 15));
  const prevSolar = SOLAR_MONTH_NAMES[((month - 4 + 12) % 12)];
  document.getElementById('month-sub').textContent = `${prevSolar} • ${solar}`;

  renderSkeleton();

  monthData = await fetchMonthData(year, month, currentCity.lat, currentCity.lon);
  renderGrid();

}

// ---------------------------------------------------------------------------
// Select a day → open single-day view
// ---------------------------------------------------------------------------
function selectDay(key) {
  window.location.href = `/?date=${encodeURIComponent(key)}`;
}

// ---------------------------------------------------------------------------
// Month navigation
// ---------------------------------------------------------------------------
document.getElementById('btn-prev-month').addEventListener('click', () => {
  if (viewMonth === 0) { viewMonth = 11; viewYear--; }
  else { viewMonth--; }
  selectedDate = null;
  monthData = null;
  loadMonth(viewYear, viewMonth);
});

document.getElementById('btn-next-month').addEventListener('click', () => {
  if (viewMonth === 11) { viewMonth = 0; viewYear++; }
  else { viewMonth++; }
  selectedDate = null;
  monthData = null;
  loadMonth(viewYear, viewMonth);
});

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------
updateCityUI();
updateLangUI();
loadMonth(viewYear, viewMonth);
</script>
</body>
</html>
