<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7b1fa2" />
    <title>Dakshin Panchangam — Tamil · Telugu · Kannada · Malayalam</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1 id="app-title">தக்ஷிண பஞ்சாங்கம்</h1>
      <select id="lang-toggle">
        <option value="ta">தமிழ்</option>
        <option value="te">తెలుగు</option>
        <option value="kn">ಕನ್ನಡ</option>
        <option value="ml">മലയാളം</option>
        <option value="en">English</option>
      </select>
    </header>

    <main class="layout">
      <section class="panel inputs">
        <h2 id="calc-title">கணக்கிடு</h2>
        <div class="field">
          <label for="date-input" id="label-date">தேதி</label>
          <input type="date" id="date-input" />
        </div>

        <div class="field">
          <label for="city-select" id="label-city">நகரம்</label>
          <select id="city-select"></select>
        </div>

        <div class="coords">
          <div class="field">
            <label for="lat-input" id="label-lat">அகலாங்கம் (Lat)</label>
            <input type="number" id="lat-input" step="0.0001" />
          </div>
          <div class="field">
            <label for="lon-input" id="label-lon">நெட்டாங்கம் (Lon)</label>
            <input type="number" id="lon-input" step="0.0001" />
          </div>
        </div>

        <div class="actions">
          <button id="geo-btn" type="button">Use My Location</button>
          <button id="calc-btn" type="button">Calculate</button>
        </div>

        <div class="actions">
          <button id="notify-btn" type="button">Enable Reminder</button>
        </div>
      </section>

      <section class="panel results">
        <h2 id="result-title">இன்றைய பலன்கள்</h2>
        <div id="results-grid" class="results-grid"></div>
      </section>

      <aside class="panel news">
        <div class="news-head">
          <h2 id="news-title">Bhakti News</h2>
          <input id="news-search" type="search" placeholder="Search articles" />
        </div>
        <div id="news-chips" class="news-chips"></div>
        <button id="rss-load-btn" type="button">Refresh</button>
        <div id="news-feed" class="news-grid"></div>
      </aside>
    </main>

    <section class="panel month-panel">
      <div class="month-header">
        <h2 id="month-title-text">மாத பஞ்சாங்கம்</h2>
        <div class="month-nav">
          <button id="month-prev" type="button">◀</button>
          <strong id="month-title"></strong>
          <button id="month-next" type="button">▶</button>
        </div>
      </div>
      <div class="dpMonthGrid dpFlex">
        <div id="weekday-rail" class="dpGridWeekday dpFlex dpFlexColumn"></div>
        <div id="month-grid-body" class="dpMonthGridBody"></div>
      </div>
    </section>

    <footer>
      <small id="footer-note">Offline-ready PWA • Client-side only</small>
    </footer>

    <script src="assets/swisseph.js"></script>
    <script src="app.js"></script>
  </body>
</html>
